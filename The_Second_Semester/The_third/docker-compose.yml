services:
  server:
    build:
      context: .
    ports:
      - "8001:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:qwerty12@db:5432/animal_store

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: qwerty12
      POSTGRES_DB: animal_store
    volumes:
      - ./db_data:/var/lib/postgresql/data
